# Deploys the Python Function App in Pipelines/ to Azure when that folder changes.
# Requires GitHub repo secrets (see comments below). OIDC must allow this workflow file
# on the same Azure AD app registration used for backend deploy (or add a federated credential).

name: Deploy Function App - lh-sanctuary-ml-pipelines

on:
  push:
    branches:
      - main
    paths:
      - 'Pipelines/**'
      - '.github/workflows/deploy-lh-sanctuary-ml-pipelines.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate function_app.py
        run: python -m py_compile Pipelines/function_app.py

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_31C7C051C20C4A1381276707C5D05E0B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5D38AD2B52E343CCA28A5F40683BEEDE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4A73066E6DDE4481A0EBF87461F15D0B }}

      # Flex Consumption: declare sku so RBAC validation finds the site (avoids "Sites doesn't exist").
      # Use remote-build (not scm-do-build/enable-oryx) for Flex + Python per functions-action docs.
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ github.workspace }}/Pipelines
          sku: flexconsumption
          remote-build: true
          respect-funcignore: true
