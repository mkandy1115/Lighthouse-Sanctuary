# Deploys the Python Function App in Pipelines/ to Azure when that folder changes.
#
# Uses a publish profile (SCM credentials) so Azure/functions-action does NOT run RBAC
# resource validation — that step often fails for Flex Consumption with
# "Microsoft.Web/Sites doesn't exist" even when the app is correct.
#
# Required GitHub Actions secrets:
#   AZURE_FUNCTIONAPP_NAME           — Function App name (Portal → Overview → Name)
#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE — full contents of the .PublishSettings file

name: Deploy Function App - lh-sanctuary-ml-pipelines

on:
  push:
    branches:
      - main
    paths:
      - 'Pipelines/**'
      - '.github/workflows/deploy-lh-sanctuary-ml-pipelines.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate function_app.py
        run: python -m py_compile Pipelines/function_app.py

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ github.workspace }}/Pipelines
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          sku: flexconsumption
          remote-build: true
          respect-funcignore: true
